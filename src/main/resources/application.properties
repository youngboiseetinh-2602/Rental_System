spring.config.import=optional:file:${user.dir}/.env[.properties],optional:file:./.env[.properties],optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}
spring.application.name=rental_room_service

spring.datasource.url=jdbc:mysql://localhost:3306/rental_room_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.open-in-view=false
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=none
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.signerKey=${JWT_SIGNER_KEY}

springdoc.swagger-ui.path=/swagger-ui.html
